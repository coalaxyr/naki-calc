<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>纳期计算</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 60px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    width: 100%;
    max-width: 680px;
    padding: 40px 36px;
  }
  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: #1a202c;
    margin-bottom: 6px;
  }
  .subtitle {
    color: #718096;
    font-size: 0.95rem;
    margin-bottom: 32px;
  }
  .upload-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 28px;
  }
  @media(max-width: 500px) { .upload-grid { grid-template-columns: 1fr; } }
  .upload-box {
    border: 2px dashed #cbd5e0;
    border-radius: 12px;
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .upload-box:hover { border-color: #4299e1; background: #ebf8ff; }
  .upload-box.ready { border-color: #48bb78; background: #f0fff4; }
  .upload-box input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-icon { font-size: 2rem; margin-bottom: 8px; }
  .upload-label { font-weight: 600; color: #2d3748; font-size: 0.9rem; }
  .upload-hint { color: #a0aec0; font-size: 0.78rem; margin-top: 4px; }
  .file-name { color: #48bb78; font-size: 0.82rem; margin-top: 6px; font-weight: 500; word-break: break-all; }
  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: #2b6cb0; color: #fff; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-success { background: #276749; color: #fff; margin-top: 12px; }
  #status {
    margin-top: 20px;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 0.9rem;
    display: none;
  }
  #status.info    { background: #ebf8ff; color: #2c5282; border: 1px solid #bee3f8; }
  #status.success { background: #f0fff4; color: #22543d; border: 1px solid #9ae6b4; }
  #status.error   { background: #fff5f5; color: #742a2a; border: 1px solid #feb2b2; }
  #dist-section { margin-top: 24px; display: none; }
  #dist-section h3 { font-size: 1rem; color: #2d3748; margin-bottom: 10px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  th { background: #edf2f7; color: #4a5568; font-weight: 600; padding: 8px 12px; text-align: left; }
  td { padding: 7px 12px; border-top: 1px solid #f7fafc; color: #2d3748; }
  tr:nth-child(even) td { background: #f7fafc; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.78rem; font-weight: 600;
  }
  .badge-green  { background: #c6efce; color: #276749; }
  .badge-yellow { background: #ffeb9c; color: #744210; }
  .badge-red    { background: #ffc7ce; color: #742a2a; }
  .badge-gray   { background: #edf2f7; color: #4a5568; }
  .progress-bar {
    height: 4px; background: #bee3f8; border-radius: 4px; margin-top: 8px; overflow: hidden; display: none;
  }
  .progress-fill { height: 100%; background: #2b6cb0; width: 0; transition: width 0.3s; }
</style>
</head>
<body>

<div class="card">
  <h1>📦 纳期计算</h1>
  <p class="subtitle">上传到货表和订单表，自动计算第二步纳期，下载带颜色标注的结果文件</p>

  <div class="upload-grid">
    <div class="upload-box" id="box-arrive">
      <input type="file" id="file-arrive" accept=".xlsx">
      <div class="upload-icon">📥</div>
      <div class="upload-label">到货表</div>
      <div class="upload-hint">.xlsx 格式</div>
      <div class="file-name" id="name-arrive"></div>
    </div>
    <div class="upload-box" id="box-order">
      <input type="file" id="file-order" accept=".xlsx">
      <div class="upload-icon">📋</div>
      <div class="upload-label">订单表</div>
      <div class="upload-hint">.xlsx 格式</div>
      <div class="file-name" id="name-order"></div>
    </div>
  </div>

  <div class="progress-bar" id="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <button class="btn btn-primary" id="btn-calc" disabled>🚀 开始计算</button>

  <div id="status"></div>

  <div id="dist-section">
    <h3>纳期分布</h3>
    <table id="dist-table">
      <thead><tr><th>纳期</th><th>数量</th><th>类型</th></tr></thead>
      <tbody id="dist-body"></tbody>
    </table>
    <button class="btn btn-success" id="btn-download">⬇️ 下载计算结果（Excel）</button>
  </div>
</div>

<script>
// ─── 状态 ───────────────────────────────────────────────────────────────────
let arriveData = null;   // [{...}, ...]
let orderData  = null;
let resultRows = null;   // 计算完的订单行（含第二步纳期）
let resultBuf  = null;   // ArrayBuffer，供下载

// ─── 文件上传 ────────────────────────────────────────────────────────────────
function readFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array', cellDates:true});
        const ws = wb.Sheets[wb.SheetNames[0]];
        resolve(XLSX.utils.sheet_to_json(ws, {defval: null, raw: false}));
      } catch(err) { reject(err); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

document.getElementById('file-arrive').addEventListener('change', async e => {
  const f = e.target.files[0];
  if (!f) return;
  document.getElementById('name-arrive').textContent = f.name;
  document.getElementById('box-arrive').classList.add('ready');
  arriveData = await readFile(f);
  checkReady();
});

document.getElementById('file-order').addEventListener('change', async e => {
  const f = e.target.files[0];
  if (!f) return;
  document.getElementById('name-order').textContent = f.name;
  document.getElementById('box-order').classList.add('ready');
  orderData = await readFile(f);
  checkReady();
});

function checkReady() {
  document.getElementById('btn-calc').disabled = !(arriveData && orderData);
}

// ─── 工具函数 ────────────────────────────────────────────────────────────────
function toNum(v) {
  if (v == null || v === '') return 0;
  const n = parseFloat(String(v).replace(/,/g,''));
  return isNaN(n) ? 0 : n;
}

function fmtDate(val) {
  if (val == null || val === '') return null;
  if (val instanceof Date) {
    if (isNaN(val.getTime())) return null;
    const p = n => String(n).padStart(2,'0');
    return `${val.getFullYear()}-${p(val.getMonth()+1)}-${p(val.getDate())} ${p(val.getHours())}:${p(val.getMinutes())}:${p(val.getSeconds())}`;
  }
  const s = String(val).trim();
  return s || null;
}

function setStatus(msg, type='info') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = type;
  el.style.display = 'block';
}

function setProgress(pct) {
  const bar = document.getElementById('progress-bar');
  const fill = document.getElementById('progress-fill');
  bar.style.display = 'block';
  fill.style.width = pct + '%';
}

// ─── 主计算 ──────────────────────────────────────────────────────────────────
const NUM_COLS = [
  'GB在库数','事务所在库数',
  '在途一','在途二','在途三','在途四','在途五','在途六',
  '预定一','预定二','预定三','预定四','预定五',
];
const KANJI6 = ['一','二','三','四','五','六'];
const KANJI5 = ['一','二','三','四','五'];

async function calculate() {
  setProgress(10);
  setStatus('正在计算，请稍候…', 'info');

  await new Promise(r => setTimeout(r, 30)); // 让 UI 刷新

  // 构建到货表索引（SKU → 行副本）
  const arrive = new Map();
  for (const row of arriveData) {
    const sku = String(row['SKU'] || '').trim();
    if (!sku || arrive.has(sku)) continue;
    const r = {...row};
    for (const c of NUM_COLS) r[c] = toNum(r[c]);
    arrive.set(sku, r);
  }

  // 订单排序
  const orders = orderData.map((r, i) => ({...r, _origIdx: i}));
  orders.sort((a, b) => {
    const da = new Date(a['注文取込日時']);
    const db = new Date(b['注文取込日時']);
    if (isNaN(da)) return 1;
    if (isNaN(db)) return -1;
    return da - db;
  });

  setProgress(30);
  const results = [];

  for (let i = 0; i < orders.length; i++) {
    const row  = orders[i];
    const sku  = String(row['SKU'] || '').trim();
    const qty  = toNum(row['注文個数']) || 1;
    const step1 = String(row['第一步纳期'] || '').trim();
    let 納期 = null;

    if (!arrive.has(sku)) {
      results.push({idx: row._origIdx, 納期: '在途及预定皆无，请提案。'});
      continue;
    }

    const inv = arrive.get(sku);
    const 商品状态 = String(inv['商品状態'] || inv['商品状态'] || '').trim();

    if (商品状态 === '无库存且不再销售' || 商品状态 === '预废弃但有待发货') {
      納期 = '停产';
    } else if (step1 === 'RSL有库存') {
      納期 = 'RSL有库存';
    } else if (inv['GB在库数'] >= qty) {
      納期 = fmtDate(row['当前日期']) || '当日';
      inv['GB在库数'] -= qty;
    } else if (inv['事务所在库数'] >= qty) {
      納期 = fmtDate(row['当前日期']) || '当日';
      inv['事务所在库数'] -= qty;
    } else {
      let matched = false;
      for (const k of KANJI6) {
        if (inv[`在途${k}`] >= qty) {
          const d = fmtDate(inv[`在途${k}日期`]);
          納期 = d || '在途及预定皆无，请提案。';
          inv[`在途${k}`] -= qty;
          matched = true; break;
        }
      }
      if (!matched) {
        for (const k of KANJI5) {
          if (inv[`预定${k}`] >= qty) {
            const d = fmtDate(inv[`预定${k}日期`]);
            納期 = d || '在途及预定皆无，请提案。';
            inv[`预定${k}`] -= qty;
            matched = true; break;
          }
        }
      }
      if (!matched) 納期 = '在途及预定皆无，请提案。';
    }

    results.push({idx: row._origIdx, 納期});

    if (i % 200 === 0) {
      setProgress(30 + Math.round((i / orders.length) * 40));
      await new Promise(r => setTimeout(r, 0));
    }
  }

  setProgress(70);

  // 恢复原始顺序
  const resultMap = new Map(results.map(r => [r.idx, r.納期]));
  const finalRows = orderData.map((row, i) => ({...row, '第二步纳期': resultMap.get(i) || ''}));

  // 统计分布
  const dist = {};
  for (const r of finalRows) {
    const v = r['第二步纳期'];
    dist[v] = (dist[v] || 0) + 1;
  }
  const distSorted = Object.entries(dist).sort((a,b) => b[1]-a[1]);

  setProgress(80);

  // 生成 Excel
  try {
    const buf = await buildExcel(finalRows, finalRows[0] ? Object.keys(finalRows[0]) : []);
    resultBuf  = buf;
    resultRows = finalRows;

    setProgress(100);
    setStatus(`✅ 计算完成！共处理 ${finalRows.length} 条订单。`, 'success');
    showDist(distSorted);
    document.getElementById('dist-section').style.display = 'block';
  } catch(err) {
    setStatus('计算完成，但生成 Excel 时出错：' + err.message, 'error');
  }
}

// ─── 生成带样式的 Excel ───────────────────────────────────────────────────────
async function buildExcel(rows, headers) {
  const wb = new ExcelJS.Workbook();
  const ws = wb.addWorksheet('sheet1');

  ws.columns = headers.map(h => ({
    header: h, key: h, width: h === '第二步纳期' ? 26 : 18
  }));

  for (const row of rows) {
    const r = ws.addRow(headers.map(h => row[h] ?? ''));
    r.commit();
  }

  // 找第二步纳期列号
  const colIdx = headers.indexOf('第二步纳期') + 1;
  if (colIdx > 0) {
    // 表头样式
    const hdrCell = ws.getCell(1, colIdx);
    hdrCell.fill = {type:'pattern', pattern:'solid', fgColor:{argb:'FF1F4E79'}};
    hdrCell.font = {color:{argb:'FFFFFFFF'}, bold:true, name:'Arial'};
    hdrCell.alignment = {horizontal:'center'};

    // 数据行
    const green  = {type:'pattern', pattern:'solid', fgColor:{argb:'FFC6EFCE'}};
    const yellow = {type:'pattern', pattern:'solid', fgColor:{argb:'FFFFEB9C'}};
    const red    = {type:'pattern', pattern:'solid', fgColor:{argb:'FFFFC7CE'}};

    for (let r = 2; r <= rows.length + 1; r++) {
      const cell = ws.getCell(r, colIdx);
      const val  = String(cell.value || '');
      if (val.startsWith('202'))                                  cell.fill = green;
      else if (val.includes('有库存'))                             cell.fill = yellow;
      else if (val.includes('请提案') || val.includes('无库存') || val === '停产') cell.fill = red;
      cell.font      = {name:'Arial'};
      cell.alignment = {horizontal:'center'};
    }
  }

  return await wb.xlsx.writeBuffer();
}

// ─── 显示分布表 ───────────────────────────────────────────────────────────────
function badgeClass(v) {
  if (v.startsWith('202')) return 'badge-green';
  if (v.includes('有库存')) return 'badge-yellow';
  if (v.includes('请提案') || v.includes('无库存') || v === '停产') return 'badge-red';
  return 'badge-gray';
}
function badgeLabel(v) {
  if (v.startsWith('202')) return '有货（有日期）';
  if (v.includes('有库存')) return '库存标签';
  if (v === '停产') return '停产';
  if (v.includes('请提案')) return '无货';
  return '其他';
}

function showDist(distSorted) {
  const tbody = document.getElementById('dist-body');
  tbody.innerHTML = '';
  for (const [val, cnt] of distSorted) {
    const cls = badgeClass(val);
    const lbl = badgeLabel(val);
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${val}</td><td><strong>${cnt}</strong></td><td><span class="badge ${cls}">${lbl}</span></td>`;
    tbody.appendChild(tr);
  }
}

// ─── 下载 ─────────────────────────────────────────────────────────────────────
function download() {
  if (!resultBuf) return;
  const today = new Date();
  const p = n => String(n).padStart(2,'0');
  const name = `纳期计算结果${today.getFullYear()}-${p(today.getMonth()+1)}-${p(today.getDate())}.xlsx`;
  const blob = new Blob([resultBuf], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}

// ─── 绑定按钮 ─────────────────────────────────────────────────────────────────
document.getElementById('btn-calc').addEventListener('click', () => {
  document.getElementById('btn-calc').disabled = true;
  document.getElementById('dist-section').style.display = 'none';
  calculate().finally(() => {
    document.getElementById('btn-calc').disabled = false;
  });
});

document.getElementById('btn-download').addEventListener('click', download);
</script>
</body>
</html>
